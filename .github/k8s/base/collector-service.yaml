apiVersion: v1
kind: Service
metadata:
  name: sophonz-collector
  labels:
    app.kubernetes.io/name: sophonz-collector
spec:
  selector:
    app.kubernetes.io/name: sophonz-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
    - name: health
      port: 13133
      targetPort: health
